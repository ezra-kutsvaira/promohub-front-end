<svg width="2000" height="1320" viewBox="0 0 2000 1320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2000" y2="1320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF" />
      <stop offset="1" stop-color="#EEF6FF" />
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EAF5FF" />
      <stop offset="1" stop-color="#E1F0FD" />
    </linearGradient>
    <linearGradient id="moduleFill" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBFDFF" />
      <stop offset="1" stop-color="#F4F9FF" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#9BBAD5" flood-opacity="0.18" />
    </filter>
    <style>
      .canvas-title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .canvas-subtitle { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #476783; }
      .panel-title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #15324D; }
      .panel-subtitle { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #264863; }
      .panel-num { font: 800 52px 'Segoe UI', Arial, sans-serif; fill: #0E2A43; }
      .module-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .body { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #29465E; }
      .body-small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #35556F; }
      .metric { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #183551; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #23455F; }
      .muted { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #53728D; }
      .panel { fill: url(#panelFill); stroke: #93B5D0; stroke-width: 2; }
      .module { fill: url(#moduleFill); stroke: #A4C1D9; stroke-width: 1.6; }
      .divider { stroke: #B6CDE0; stroke-width: 1.5; }
      .icon-stroke { stroke: #2B5878; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #D8ECFF; stroke: #2B5878; stroke-width: 3; }
      .db-fill { fill: #CFE6FF; stroke: #2B5878; stroke-width: 3; }
    </style>
  </defs>

  <rect width="2000" height="1320" fill="url(#bg)" />

  <text x="60" y="52" class="canvas-title">PromoHub Architecture Design</text>
  <text x="60" y="80" class="canvas-subtitle">Detailed layered view of the current PromoHub implementation without any AI layer.</text>

  <!-- Left column -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" rx="20" ry="20" width="900" height="250" class="panel" />
  </g>
  <text x="92" y="176" class="panel-num">1</text>
  <text x="148" y="162" class="panel-title">Presentation Layer</text>
  <text x="148" y="194" class="panel-subtitle">(User Interface)</text>

  <rect x="86" y="214" rx="14" ry="14" width="198" height="120" class="module" />
  <text x="108" y="244" class="module-title">Public Users</text>
  <text x="108" y="272" class="body">
    <tspan x="108" dy="0">- Browse promotions</tspan>
    <tspan x="108" dy="22">- View roadshows/events</tspan>
    <tspan x="108" dy="22">- Promotion details</tspan>
  </text>

  <rect x="300" y="214" rx="14" ry="14" width="198" height="120" class="module" />
  <text x="322" y="244" class="module-title">Consumers</text>
  <text x="322" y="272" class="body">
    <tspan x="322" dy="0">- Register and login</tspan>
    <tspan x="322" dy="22">- Save promotions</tspan>
    <tspan x="322" dy="22">- Notifications and settings</tspan>
  </text>

  <rect x="514" y="214" rx="14" ry="14" width="198" height="120" class="module" />
  <text x="536" y="244" class="module-title">Business Owners</text>
  <text x="536" y="272" class="body">
    <tspan x="536" dy="0">- Submit business profile</tspan>
    <tspan x="536" dy="22">- Upload verification docs</tspan>
    <tspan x="536" dy="22">- Create, edit, and track deals</tspan>
  </text>

  <rect x="728" y="214" rx="14" ry="14" width="198" height="120" class="module" />
  <text x="750" y="244" class="module-title">Admins</text>
  <text x="750" y="272" class="body">
    <tspan x="750" dy="0">- Operations console</tspan>
    <tspan x="750" dy="22">- Verify businesses</tspan>
    <tspan x="750" dy="22">- Moderate and analyze</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="388" rx="20" ry="20" width="900" height="332" class="panel" />
  </g>
  <text x="92" y="454" class="panel-num">2</text>
  <text x="148" y="440" class="panel-title">Application Layer</text>
  <text x="148" y="472" class="panel-subtitle">(Business Logic)</text>

  <rect x="86" y="514" rx="14" ry="14" width="262" height="86" class="module" />
  <text x="108" y="544" class="module-title">Authentication and Access</text>
  <text x="108" y="570" class="body-small">
    <tspan x="108" dy="0">Login, registration, role checks,</tspan>
    <tspan x="108" dy="20">guarded routes, and profiles.</tspan>
  </text>

  <rect x="370" y="514" rx="14" ry="14" width="262" height="86" class="module" />
  <text x="392" y="544" class="module-title">Business Verification</text>
  <text x="392" y="570" class="body-small">
    <tspan x="392" dy="0">Business onboarding, document upload,</tspan>
    <tspan x="392" dy="20">review, approval, and rejection.</tspan>
  </text>

  <rect x="654" y="514" rx="14" ry="14" width="272" height="86" class="module" />
  <text x="676" y="544" class="module-title">Promotion Management</text>
  <text x="676" y="570" class="body-small">
    <tspan x="676" dy="0">Create, edit, approve, reject,</tspan>
    <tspan x="676" dy="20">resubmit, and flag promotions.</tspan>
  </text>

  <rect x="86" y="616" rx="14" ry="14" width="262" height="86" class="module" />
  <text x="108" y="646" class="module-title">Saved Promotions</text>
  <text x="108" y="672" class="body-small">
    <tspan x="108" dy="0">Saved deals, reminder settings,</tspan>
    <tspan x="108" dy="20">and user engagement.</tspan>
  </text>

  <rect x="370" y="616" rx="14" ry="14" width="262" height="86" class="module" />
  <text x="392" y="646" class="module-title">Reports and Notifications</text>
  <text x="392" y="672" class="body-small">
    <tspan x="392" dy="0">Reports, review flow, in-app alerts,</tspan>
    <tspan x="392" dy="20">preferences, and subscriptions.</tspan>
  </text>

  <rect x="654" y="616" rx="14" ry="14" width="272" height="86" class="module" />
  <text x="676" y="646" class="module-title">Analytics and Security</text>
  <text x="676" y="672" class="body-small">
    <tspan x="676" dy="0">Dashboards, moderation metrics,</tspan>
    <tspan x="676" dy="20">password changes, reset, and MFA.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="748" rx="20" ry="20" width="900" height="178" class="panel" />
  </g>
  <text x="92" y="814" class="panel-num">3</text>
  <text x="148" y="800" class="panel-title">Communication Layer</text>

  <rect x="86" y="840" rx="14" ry="14" width="270" height="72" class="module" />
  <text x="108" y="868" class="module-title">Shared API Client</text>
  <text x="108" y="888" class="body-small">
    <tspan x="108" dy="0">API requests, endpoint fallbacks,</tspan>
    <tspan x="108" dy="18">and token refresh.</tspan>
  </text>

  <rect x="376" y="840" rx="14" ry="14" width="270" height="72" class="module" />
  <text x="398" y="868" class="module-title">Notification Sync</text>
  <text x="398" y="888" class="body-small">
    <tspan x="398" dy="0">Notification polling, unread counts,</tspan>
    <tspan x="398" dy="18">and read-state updates.</tspan>
  </text>

  <rect x="666" y="840" rx="14" ry="14" width="260" height="72" class="module" />
  <text x="688" y="868" class="module-title">File Integration</text>
  <text x="688" y="888" class="body-small">
    <tspan x="688" dy="0">Document uploads and protected</tspan>
    <tspan x="688" dy="18">file downloads.</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="954" rx="20" ry="20" width="900" height="184" class="panel" />
  </g>
  <text x="92" y="1020" class="panel-num">4</text>
  <text x="148" y="1006" class="panel-title">Data Access Layer</text>

  <rect x="86" y="1034" rx="14" ry="14" width="840" height="86" class="module" />
  <text x="112" y="1064" class="body-small">
    <tspan x="112" dy="0">- Typed models for users, businesses, promotions, reports, and analytics</tspan>
    <tspan x="112" dy="20">- Auth state, notification state, and UI state</tspan>
    <tspan x="112" dy="20">- Session storage, response helpers, and error handling</tspan>
  </text>

  <g filter="url(#shadow)">
    <rect x="60" y="1156" rx="20" ry="20" width="900" height="128" class="panel" />
  </g>
  <text x="92" y="1212" class="panel-num">5</text>
  <text x="148" y="1198" class="panel-title">Base Technology Layer</text>

  <rect x="486" y="1186" rx="14" ry="14" width="440" height="78" class="module" />
  <text x="512" y="1216" class="body-small">
    <tspan x="512" dy="0">- React + TypeScript</tspan>
    <tspan x="512" dy="20">- Vite + React Router</tspan>
    <tspan x="512" dy="20">- Tailwind CSS + shadcn/ui</tspan>
  </text>

  <!-- Right column -->
  <g filter="url(#shadow)">
    <rect x="1000" y="110" rx="20" ry="20" width="860" height="214" class="panel" />
  </g>
  <text x="1032" y="162" class="panel-title">External Services/APIs</text>

  <rect x="1032" y="196" rx="14" ry="14" width="796" height="52" class="module" />
  <rect x="1050" y="208" width="28" height="28" rx="6" class="icon-fill" />
  <path d="M1058 216H1070M1058 222H1070M1058 228H1066" class="icon-stroke" />
  <text x="1096" y="220" class="module-title">PromoHub Backend API</text>
  <text x="1096" y="240" class="muted">Main REST API used by the frontend.</text>

  <rect x="1032" y="260" rx="14" ry="14" width="796" height="52" class="module" />
  <rect x="1050" y="272" width="28" height="28" rx="6" class="icon-fill" />
  <path d="M1056 280H1072M1056 286H1072M1056 292H1068" class="icon-stroke" />
  <text x="1096" y="284" class="module-title">Document Storage</text>
  <text x="1096" y="304" class="muted">Stores uploaded verification files.</text>

  <g filter="url(#shadow)">
    <rect x="1000" y="350" rx="20" ry="20" width="860" height="300" class="panel" />
  </g>
  <text x="1032" y="402" class="panel-title">Backend Services Layer</text>

  <rect x="1032" y="444" rx="14" ry="14" width="382" height="70" class="module" />
  <text x="1054" y="474" class="module-title">Auth and User Service</text>
  <text x="1054" y="496" class="body-small">sessions, roles, profiles, password, MFA</text>

  <rect x="1446" y="444" rx="14" ry="14" width="382" height="70" class="module" />
  <text x="1468" y="474" class="module-title">Business Verification</text>
  <text x="1468" y="496" class="body-small">business setup, document review, approval, rejection</text>

  <rect x="1032" y="534" rx="14" ry="14" width="382" height="70" class="module" />
  <text x="1054" y="564" class="module-title">Promotion and Reports</text>
  <text x="1054" y="586" class="body-small">promotion publishing, saved deals, report moderation</text>

  <rect x="1446" y="534" rx="14" ry="14" width="382" height="70" class="module" />
  <text x="1468" y="564" class="module-title">Notifications and Analytics</text>
  <text x="1468" y="586" class="body-small">alerts, dashboards, summaries, and audit logs</text>

  <g filter="url(#shadow)">
    <rect x="1000" y="672" rx="20" ry="20" width="860" height="546" class="panel" />
  </g>
  <text x="1032" y="724" class="panel-title">Database Layer</text>

  <rect x="1032" y="766" rx="14" ry="14" width="796" height="230" class="module" />
  <g transform="translate(1054 800)">
    <ellipse cx="28" cy="10" rx="22" ry="10" class="db-fill" />
    <path d="M6 10V40C6 45.5 16 50 28 50C40 50 50 45.5 50 40V10" class="icon-stroke" />
    <ellipse cx="28" cy="40" rx="22" ry="10" class="db-fill" />
    <ellipse cx="28" cy="25" rx="22" ry="10" class="db-fill" />
  </g>
  <text x="1112" y="816" class="module-title">Core Persistent Data</text>
  <text x="1112" y="850" class="body">
    <tspan x="1112" dy="0">- Users and sessions</tspan>
    <tspan x="1112" dy="24">- Businesses and verification records</tspan>
    <tspan x="1112" dy="24">- Promotions and saved promotions</tspan>
    <tspan x="1112" dy="24">- Notifications and reports</tspan>
    <tspan x="1112" dy="24">- Analytics, audit logs, and document metadata</tspan>
  </text>

  <rect x="1032" y="1020" rx="14" ry="14" width="796" height="86" class="module" />
  <text x="1054" y="1050" class="module-title">Storage Characteristic</text>
  <text x="1054" y="1078" class="body-small">
    <tspan x="1054" dy="0">Backend-managed persistent storage plus protected file storage</tspan>
    <tspan x="1054" dy="20">for verification documents.</tspan>
  </text>
</svg>
